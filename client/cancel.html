<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registration Cancelled - Kubesimplify Workshops</title>
    <meta name="description" content="The workshop registration checkout process was cancelled or encountered an error." />
    <link rel="stylesheet" type="text/css" href="css/cancel.css" />
    <link rel="icon" type="image/x-icon" href="assets/icon.svg" />
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar">
      <a class="nav-content" href="https://kubesimplify.com/" target="_blank">
        <img src="assets/logo.svg" alt="Kubesimplify Logo" />
      </a>
    </div>

    <!-- Error Content Box -->
    <div class="container">
      <div class="box">
        <div class="title">
          <h1>Error ⚠️</h1>
        </div>
        <img src="assets/error.svg" alt="Error Alert" />
        <p style="margin-bottom: 12px">Oops! Something went wrong or checkout was cancelled.</p>
        <div class="button">
          <input type="button" value="Try Again" id="try-again-btn" />
        </div>
      </div>
    </div>

    <!-- Client-side script -->
    <script>
      var btn = document.getElementById("try-again-btn");
      btn.addEventListener("click", function (e) {
        e.preventDefault();
        location.href = window.location.origin;
      });
    </script>
  </body>
</html>
